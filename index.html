<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>科學班倒數</title>

<style>

:root{
--bg:#0b0000;
--box:#1a0000;
--text:#ff0000;
--progress:#8b0000;
}

body{
background:radial-gradient(circle,#200000,#000);
font-family:Arial;
text-align:center;
color:var(--text);
margin:0;
padding-top:50px;
overflow-x:hidden;
}

/* 標題 */

h1{
font-size:40px;
text-shadow:0 0 10px red;
letter-spacing:3px;
}

/* 四格 */

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
max-width:320px;
margin:40px auto;

}

.box{

background:var(--box);
border:2px solid #300000;
border-radius:10px;
padding:25px;
box-shadow:0 0 20px rgba(255,0,0,0.3);

}

.number{

font-size:38px;
font-weight:bold;
color:#ff2a2a;

}

.label{

color:#aa0000;

}

/* 秒數動畫 */

.tick{

animation:shake 0.3s;

}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-2px);}
50%{transform:translateX(2px);}
75%{transform:translateX(-2px);}
100%{transform:translateX(0);}

}

/* 進度條 */

.progress-container{

width:80%;
max-width:350px;
height:20px;
background:#220000;
border-radius:20px;
margin:30px auto;
overflow:hidden;

}

.progress-bar{

height:100%;
width:0%;
background:linear-gradient(90deg,#ff0000,#8b0000);

}

.percent{

font-weight:bold;
margin-top:5px;

}

/* 血滴 */

.blood{

position:fixed;
top:-20px;
font-size:20px;
animation:drop linear infinite;

}

@keyframes drop{

0%{transform:translateY(-20px);}
100%{transform:translateY(110vh);}

}

/* 按鈕 */

button{

margin-top:10px;
padding:8px 15px;
background:#8b0000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;

}

/* 手機 */

@media (max-width:480px){

h1{font-size:28px;}

.number{font-size:30px;}

.box{padding:20px;}

}

</style>
</head>

<body>

<h1>🩸 2026 科學班倒數 🩸</h1>

<button onclick="toggleDark()">🌙 切換模式</button>

<div class="grid">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">天</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">小時</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">分鐘</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">秒</div>
</div>

</div>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>

<script>

/* 日期 */

var start = new Date("2025-09-01").getTime();
var target = new Date("2026-03-14 08:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var diff = target - now;

var days = Math.floor(diff/(1000*60*60*24));
var hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((diff%(1000*60*60))/(1000*60));
var seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;

var sec = document.getElementById("seconds");

sec.innerHTML = seconds;
sec.classList.add("tick");

setTimeout(()=>sec.classList.remove("tick"),300);

/* 進度 */

var progress = ((now-start)/(target-start))*100;

if(progress<0) progress=0;
if(progress>100) progress=100;

document.getElementById("progress").style.width = progress + "%";
document.getElementById("percent").innerHTML = progress.toFixed(1)+"%";

},1000);

/* 血滴 */

function createBlood(){

var blood = document.createElement("div");

blood.classList.add("blood");

blood.innerHTML="🩸";

blood.style.left=Math.random()*100+"vw";

blood.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(blood);

setTimeout(()=>blood.remove(),6000);

}

setInterval(createBlood,300);

function toggleDark(){

document.body.classList.toggle("dark");

}

</script>

</body>
</html>
