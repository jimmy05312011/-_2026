<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 一中科學班倒數</title>

<style>

:root{
--bg:#ffe6f2;
--box:#ffffff;
--text:#ff4fa3;
--progress:#ff4fa3;
}

body.dark{
--bg:#121212;
--box:#1e1e1e;
--text:#ff9bd1;
--progress:#ff9bd1;
}

body{
background:var(--bg);
font-family:Arial;
text-align:center;
margin:0;
padding-top:50px;
transition:0.4s;
overflow-x:hidden;
}

h1{
color:var(--text);
font-size:40px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:10px;
background:var(--text);
color:white;
cursor:pointer;
}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
max-width:320px;
margin:40px auto;

}

.box{

background:var(--box);
border-radius:20px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);

}

.number{

font-size:36px;
font-weight:bold;
color:var(--text);

}

.label{

color:#777;
font-size:16px;

}

/* 秒數動畫 */

.tick{

animation:pop 0.3s;

}

@keyframes pop{

0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}

}

/* 進度條 */

.progress-container{

width:80%;
max-width:350px;
height:20px;
background:#ffd0e8;
border-radius:20px;
margin:30px auto;
overflow:hidden;

}

.progress-bar{

height:100%;
width:0%;
background:var(--progress);

}

.percent{

color:var(--text);
font-weight:bold;

}

/* 櫻花 */

.sakura{

position:fixed;
top:-10px;
color:#ff9bd1;
font-size:20px;
animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* 手機優化 */

@media (max-width:480px){

h1{font-size:28px;}

.number{font-size:30px;}

.box{padding:20px;}

}

</style>
</head>

<body>

<h1>🌸 2026 一中科學班倒數 🌸</h1>

<button onclick="toggleDark()">🌙 夜間模式</button>

<div class="grid">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">天</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">小時</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">分鐘</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">秒</div>
</div>

</div>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>

<script>

/* 倒數時間 */

var start = new Date("2025-09-01").getTime();
var target = new Date("2026-04-01 08:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var diff = target - now;

var days = Math.floor(diff/(1000*60*60*24));
var hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((diff%(1000*60*60))/(1000*60));
var seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;

var secElement = document.getElementById("seconds");
secElement.innerHTML = seconds;
secElement.classList.add("tick");

setTimeout(()=>secElement.classList.remove("tick"),300);

/* 進度條 */

var progress = ((now-start)/(target-start))*100;

if(progress<0) progress=0;
if(progress>100) progress=100;

document.getElementById("progress").style.width = progress + "%";
document.getElementById("percent").innerHTML = progress.toFixed(1) + "%";

},1000);


/* 夜間模式 */

function toggleDark(){

document.body.classList.toggle("dark");

}

/* 櫻花生成 */

function createSakura(){

var sakura = document.createElement("div");

sakura.classList.add("sakura");

sakura.innerHTML="🌸";

sakura.style.left=Math.random()*100+"vw";

sakura.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(sakura);

setTimeout(()=>{sakura.remove()},10000);

}

setInterval(createSakura,400);

</script>

</body>
</html>
