<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>科學班倒數</title>

<style>

:root{
--bg:#ffe6f2;
--box:#ffffff;
--text:#ff4fa3;
--progress:#ff4fa3;
}

/* 血腥模式 */

body.blood{
--bg:#050000;
--box:#1a0000;
--text:#ff0000;
--progress:#8b0000;
}

body{
background:var(--bg);
font-family:Arial;
text-align:center;
margin:0;
padding-top:50px;
transition:0.4s;
overflow-x:hidden;
}

h1{
color:var(--text);
font-size:38px;
}

/* 四格 */

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
max-width:320px;
margin:40px auto;

}

.box{

background:var(--box);
border-radius:20px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);

}

.number{

font-size:36px;
font-weight:bold;
color:var(--text);

}

.label{

color:#777;

}

/* 秒數動畫 */

.tick{
animation:pop 0.3s;
}

@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.25);}
100%{transform:scale(1);}
}

/* 進度條 */

.progress-container{

width:80%;
max-width:350px;
height:20px;
background:#ddd;
border-radius:20px;
margin:30px auto;
overflow:hidden;

}

.progress-bar{

height:100%;
width:0%;
background:var(--progress);

}

.percent{

color:var(--text);
font-weight:bold;

}

button{

padding:10px 18px;
border:none;
border-radius:10px;
background:var(--text);
color:white;
cursor:pointer;

}

/* 粒子 */

.particle{

position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;

}

@keyframes fall{

0%{transform:translateY(-20px) rotate(0);}
100%{transform:translateY(110vh) rotate(360deg);}

}

/* 手機 */

@media (max-width:480px){

h1{font-size:26px;}
.number{font-size:30px;}

}

</style>
</head>

<body>

<h1 id="title">🎀 科學班倒數 🎀</h1>

<button onclick="toggleMode()">切換風格</button>

<div class="grid">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">天</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">小時</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">分鐘</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">秒</div>
</div>

</div>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>

<script>

/* 日期 */

var start = new Date("2025-09-01").getTime();
var target = new Date("2026-03-14 08:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var diff = target - now;

var days = Math.floor(diff/(1000*60*60*24));
var hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((diff%(1000*60*60))/(1000*60));
var seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;

var sec = document.getElementById("seconds");

sec.innerHTML = seconds;
sec.classList.add("tick");

setTimeout(()=>sec.classList.remove("tick"),300);

/* 手機震動 */

if(navigator.vibrate){
navigator.vibrate(40);
}

/* 進度條 */

var progress = ((now-start)/(target-start))*100;

if(progress<0) progress=0;
if(progress>100) progress=100;

document.getElementById("progress").style.width = progress+"%";
document.getElementById("percent").innerHTML = progress.toFixed(1)+"%";

},1000);


/* 風格切換 */

function toggleMode(){

document.body.classList.toggle("blood");

if(document.body.classList.contains("blood")){

document.getElementById("title").innerHTML="🩸 科學班倒數 🩸";

}else{

document.getElementById("title").innerHTML="🎀 科學班倒數 🎀";

}

}


/* 粒子 */

function createParticle(){

var p=document.createElement("div");

p.classList.add("particle");

if(document.body.classList.contains("blood")){
p.innerHTML="🩸";
}else{
p.innerHTML="🌸";
}

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(p);

setTimeout(()=>p.remove(),8000);

}

setInterval(createParticle,400);

</script>

</body>
</html>
